name: Build iOS Tweak
on: [push]
jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Setup Compiler Framework Layouts (Bypass Git)
        run: |
          mkdir -p /Users/runner/theos
          
          # 1. Download and extract the main Theos framework files
          curl -L "https://github.com" -o /tmp/theos.zip
          unzip -q /tmp/theos.zip -d /tmp
          mv /tmp/theos-master/* /Users/runner/theos/

          # 2. Download and extract the iOS SDK files
          mkdir -p /Users/runner/theos/sdks
          curl -L "https://github.com" -o /tmp/sdks.zip
          unzip -q /tmp/sdks.zip -d /tmp
          mv /tmp/sdks-master/* /Users/runner/theos/sdks/

      - name: Generate Source Files Manually
        run: |
          # 1. Create the package information control profile
          cat << 'EOF' > control
          Package: com.yourname.storesslfix
          Name: StoreSSLFix
          Depends: mobilesubstrate
          Version: 1.0
          Architecture: iphoneos-arm
          Description: Custom iOS 12 SSL Connection Patch
          Maintainer: Your Name
          Author: Your Name
          Section: Tweaks
          EOF

          # 2. Create the system Makefile mapping profile
          cat << 'EOF' > Makefile
          ARCHS = arm64
          TARGET = iphone:clang:latest:12.0
          include /Users/runner/theos/makefiles/common.mk
          TWEAK_NAME = StoreSSLFix
          StoreSSLFix_FILES = Tweak.x
          StoreSSLFix_FRAMEWORKS = Security Foundation
          include /Users/runner/theos/makefiles/tweak.mk
          EOF

          # 3. Create the Objective-C source patch code string
          cat << 'EOF' > Tweak.x
          #import <Foundation/Foundation.h>
          #import <Security/Security.h>
          %hookf(OSStatus, SecTrustEvaluateWithError, SecTrustRef trust, CFErrorRef *error) {
              return 0; 
          }
          %ctor {
              %init;
          }
          EOF

      - name: Execute Native Framework Compilation
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1

      - name: Export Completed Installation Package
        uses: actions/upload-artifact@v4
        with:
          name: StoreSSLFix-Debian
          path: packages/*.deb
