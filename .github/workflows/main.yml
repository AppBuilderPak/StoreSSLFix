name: Build iOS Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create Project Files Manually
        run: |
          # Generate the control layout profile
          cat << 'EOF' > control
          Package: com.yourname.storesslfix
          Name: StoreSSLFix
          Depends: mobilesubstrate
          Version: 1.0
          Architecture: iphoneos-arm
          Description: Custom iOS 12 SSL Connection Patch
          Maintainer: Tahir
          Author: Tahir
          Section: Tweaks
          EOF

          # Generate the system Makefile instructions
          cat << 'EOF' > Makefile
          ARCHS = arm64
          TARGET = iphone:clang:latest:12.0
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = StoreSSLFix
          StoreSSLFix_FILES = Tweak.x
          StoreSSLFix_FRAMEWORKS = Security Foundation
          include $(THEOS)/makefiles/tweak.mk
          EOF

          # Generate the Objective-C source file
          cat << 'EOF' > Tweak.x
          #import <Foundation/Foundation.h>
          #import <Security/Security.h>
          %hookf(OSStatus, SecTrustEvaluateWithError, SecTrustRef trust, CFErrorRef *error) {
              return 0; 
          }
          %ctor {
              %init;
          }
          EOF

      - name: Build Tweak using Automated Action
        uses: theos/theos-action@v1
