name: Build iOS Tweak
on: [push]
jobs:
  build:
    # CHANGED TO MACOS-14 (Apple Silicon) TO UNBLOCK THE QUEUE IMMEDIATELY
    runs-on: macos-14
    steps:
      - name: Setup Compiler Framework Layouts
        run: |
          mkdir -p /Users/runner/theos
          git clone --recursive "https://github.com" /Users/runner/theos
          git clone "https://github.com" /Users/runner/theos/sdks

      - name: Generate Source Files Manually
        run: |
          # 1. Create the control information layout
          cat << 'EOF' > control
          Package: com.tahir.storesslfix
          Name: StoreSSLFix
          Depends: mobilesubstrate
          Version: 1.0
          Architecture: iphoneos-arm
          Description: Custom iOS 12 SSL Connection Patch
          Maintainer: Tahir
          Author: Tahir
          Section: Tweaks
          EOF

          # 2. Create the Makefile instruction layout
          cat << 'EOF' > Makefile
          ARCHS = arm64
          TARGET = iphone:clang:latest:12.0
          include /Users/runner/theos/makefiles/common.mk
          TWEAK_NAME = StoreSSLFix
          StoreSSLFix_FILES = Tweak.x
          StoreSSLFix_FRAMEWORKS = Security Foundation
          include /Users/runner/theos/makefiles/tweak.mk
          EOF

          # 3. Create the Objective-C source hook code string
          cat << 'EOF' > Tweak.x
          #import <Foundation/Foundation.h>
          #import <Security/Security.h>
          %hookf(OSStatus, SecTrustEvaluateWithError, SecTrustRef trust, CFErrorRef *error) {
              return 0; 
          }
          %ctor {
              %init;
          }
          EOF

      - name: Execute Native Framework Compilation
        run: |
          export THEOS=/Users/runner/theos
          make package FINALPACKAGE=1

      - name: Export Completed Installation Package
        uses: actions/upload-artifact@v4
        with:
          name: StoreSSLFix-Debian
          path: packages/*.deb
