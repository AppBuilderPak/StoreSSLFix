name: Build iOS Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y bzip2 ninja-build python3-pyelftools git curl perl clang make

      - name: Setup Theos Toolchain
        run: |
          mkdir -p /home/runner/theos
          git clone --recursive "https://github.com" /home/runner/theos
          
          mkdir -p /home/runner/theos/sdks
          git clone "https://github.com" /home/runner/theos/sdks

      - name: Create Project Files Manually
        run: |
          cat << 'EOF' > control
          Package: com.yourname.storesslfix
          Name: StoreSSLFix
          Depends: mobilesubstrate
          Version: 1.0
          Architecture: iphoneos-arm
          Description: Custom iOS 12 SSL Connection Patch
          Maintainer: Tahir
          Author: Tahir
          Section: Tweaks
          EOF

          cat << 'EOF' > Makefile
          ARCHS = arm64
          TARGET = iphone:clang:latest:12.0
          include /home/runner/theos/makefiles/common.mk
          TWEAK_NAME = StoreSSLFix
          StoreSSLFix_FILES = Tweak.x
          StoreSSLFix_FRAMEWORKS = Security Foundation
          include /home/runner/theos/makefiles/tweak.mk
          EOF

          cat << 'EOF' > Tweak.x
          #import <Foundation/Foundation.h>
          #import <Security/Security.h>
          %hookf(OSStatus, SecTrustEvaluateWithError, SecTrustRef trust, CFErrorRef *error) {
              return 0; 
          }
          %ctor {
              %init;
          }
          EOF

      - name: Compile Package
        run: |
          export THEOS=/home/runner/theos
          make package FINALPACKAGE=1

      - name: Upload Finished DEB File
        uses: actions/upload-artifact@v4
        with:
          name: StoreSSLFix-Debian
          path: packages/*.deb
