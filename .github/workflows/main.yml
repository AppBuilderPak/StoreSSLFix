name: Build iOS Tweak
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create Project Workspace
        run: |
          mkdir -p project
          
          # 1. Create the control file
          cat << 'EOF' > project/control
          Package: com.yourname.storesslfix
          Name: StoreSSLFix
          Depends: mobilesubstrate
          Version: 1.0
          Architecture: iphoneos-arm
          Description: Custom iOS 12 SSL Connection Patch
          Maintainer: Your Name
          Author: Your Name
          Section: Tweaks
          EOF

          # 2. Create the Makefile
          cat << 'EOF' > project/Makefile
          ARCHS = arm64
          TARGET = iphone:clang:latest:12.0
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = StoreSSLFix
          StoreSSLFix_FILES = Tweak.x
          StoreSSLFix_FRAMEWORKS = Security Foundation
          include $(THEOS)/makefiles/tweak.mk
          EOF

          # 3. Create the Tweak source code
          cat << 'EOF' > project/Tweak.x
          #import <Foundation/Foundation.h>
          #import <Security/Security.h>
          %hookf(OSStatus, SecTrustEvaluateWithError, SecTrustRef trust, CFErrorRef *error) {
              return 0; 
          }
          %ctor {
              %init;
          }
          EOF

      - name: Compile iOS Debian Package
        uses: mileskresic/theos-action@v1.0.2
        with:
          theos-src: project
          theos-sdks: 'https://github.com'

      - name: Upload Finished DEB File
        uses: actions/upload-artifact@v4
        with:
          name: StoreSSLFix-Debian
          path: project/packages/*.deb
